# ============================================
# NOBLE-CERT SYSTEM — Docker Compose
# ============================================
# Usage:
#   cp .env.docker.example .env.docker
#   docker compose up -d --build
# ============================================

services:
  # ── MongoDB (Replica Set required by Prisma) ──
  mongo:
    image: mongo:7
    container_name: noble-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }" | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noble-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/noble-cert?directConnection=true&replicaSet=rs0
    depends_on:
      mongo:
        condition: service_healthy

  # ── Student Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:5000
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    container_name: noble-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend

  # ── Admin Frontend ──
  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:5000
        NEXT_PUBLIC_APP_URL: http://localhost:3001
        NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
    container_name: noble-admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./admin-frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend

volumes:
  mongo_data:
